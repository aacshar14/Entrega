name: CI - PR Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            db:
              - 'apps/api/alembic/versions/**'

  lint_python:
    name: 🐍 Python Lint
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Black
        run: pip install black==26.3.1
      - name: Check Format
        run: |
          if ! black --check . --exclude "apps/api/alembic/versions/"; then
            echo "❌ Error de formato en Python."
            echo "👉 Corrección requerida: Ejecuta 'black .' localmente."
            exit 1
          fi

  lint_web:
    name: ⚛️ Web Lint
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Deps
        working-directory: apps/web
        run: npm ci
      - name: Check Format
        working-directory: apps/web
        run: |
          if ! npm run format:check; then
            echo "❌ Error de formato en el Frontend."
            echo "👉 Corrección requerida: Ejecuta 'npm run format' localmente."
            exit 1
          fi

  api_build_check:
    name: 🏗️ API Build Validation
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate Dockerfile
        run: |
          cd apps/api
          docker build . -t api-test-build --no-cache

  web_build_check:
    name: 🏗️ Web Build Validation
    needs: [changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: Build Web
        working-directory: apps/web
        run: |
          npm ci
          # Dummy envs for build validation
          NEXT_PUBLIC_SUPABASE_URL=https://dummy.supabase.co \
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=dummy \
          NEXT_PUBLIC_API_URL=https://api.entrega.space \
          npm run build
