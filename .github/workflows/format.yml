name: 🧹 Auto-Format Python (Black)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'apps/api/**/*.py'
  workflow_dispatch:

jobs:
  format:
    name: 🎨 Apply Code Style
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Black
        run: pip install black==26.3.1

      - name: ⚡ Run Black (Mutation Mode)
        run: |
          echo "Applying style corrections to apps/api..."
          black apps/api/

      - name: 💾 Persist Clean Code
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated black formatting"
          file_pattern: "apps/api/**/*.py"
          commit_user_name: "Entrega Bot"
          commit_user_email: "bot@entrega.space"
          commit_author: "Entrega Bot <bot@entrega.space>"
          skip_dirty_check: false
          # We explicitly omit [skip ci] per requirements
