name: Code Quality Check

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  format:
    name: Validate Python Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Black
        run: pip install black==26.3.1

      - name: Check formatting
        run: black --check apps/api/
