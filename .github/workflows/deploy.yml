name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_ID: entrega-468815
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/api
  WEB_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/web

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
            web:
              - 'apps/web/**'
            db:
              - 'apps/api/alembic/versions/**'

  build_api:
    name: 🏗️ Build API
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build and Push
        run: |
          docker build -t $API_IMAGE:${{ github.sha }} -t $API_IMAGE:latest ./apps/api
          docker push $API_IMAGE:${{ github.sha }}
          docker push $API_IMAGE:latest

  migrate_db:
    name: 🚀 Migrate Database
    needs: [changes, build_api]
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Run Alembic
        run: |
          gcloud run jobs execute entrega-migrate \
            --region $REGION \
            --args=-m,alembic,upgrade,head \
            --wait

  deploy_api:
    name: 🚢 Deploy API
    needs: [changes, build_api, migrate_db]
    if: always() && (needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true') && (needs.build_api.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      prev_revision: ${{ steps.pre_deploy.outputs.revision }}
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      
      - name: Capture Previous Revision
        id: pre_deploy
        run: |
          REVISION=$(gcloud run services describe entrega-api --region $REGION --format='value(status.latestReadyRevisionName)' || echo "")
          echo "revision=$REVISION" >> $GITHUB_OUTPUT
      
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy entrega-api \
            --image $API_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }},WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }},WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }},SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }},WHATSAPP_APP_ID=${{ secrets.WHATSAPP_APP_ID }},WHATSAPP_APP_SECRET=${{ secrets.WHATSAPP_APP_SECRET }}"

      - name: 🔍 Readiness Check
        run: |
          set -euo pipefail
          echo "Waiting for API to stabilize..."
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.entrega.space/api/v1/health/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API is Healthy and Ready (Status: $STATUS)"
              exit 0
            fi
            echo "⌛ Attempt $i: API status $STATUS. Retrying in 5s..."
            sleep 5
          done
          echo "❌ API failed to become ready after 75s"
          exit 1

  build_web:
    name: 🏗️ Build Web
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Build and Push
        run: |
          docker build -t $WEB_IMAGE:${{ github.sha }} -t $WEB_IMAGE:latest -f apps/web/Dockerfile . \
            --build-arg NEXT_PUBLIC_API_URL=https://api.entrega.space \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }} \
            --build-arg NEXT_PUBLIC_META_APP_ID=${{ secrets.WHATSAPP_APP_ID }}
          docker push $WEB_IMAGE:${{ github.sha }}
          docker push $WEB_IMAGE:latest

  deploy_web:
    name: 🚢 Deploy Web
    needs: [changes, build_web]
    if: needs.changes.outputs.web == 'true' && (needs.build_web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy entrega-web \
            --image $WEB_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_URL=https://api.entrega.space,NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }},NEXT_PUBLIC_META_APP_ID=${{ secrets.WHATSAPP_APP_ID }}"

  final_smoke_test:
    name: 🧪 Authenticated Smoke Tests
    needs: [deploy_api, deploy_web]
    if: always() && (needs.deploy_api.result == 'success' || needs.deploy_web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Get Smoke Test Token from Supabase
        id: smoke_auth
        run: |
          set -euo pipefail

          echo "🔍 Validating required secrets..."

          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ SUPABASE_URL missing"
            exit 1
          fi

          if [ -z "${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}" ]; then
            echo "❌ SUPABASE_PUBLISHABLE_DEFAULT_KEY missing"
            exit 1
          fi

          if [ -z "${{ secrets.SMOKE_USER_EMAIL }}" ]; then
            echo "❌ SMOKE_USER_EMAIL missing"
            exit 1
          fi

          if [ -z "${{ secrets.SMOKE_USER_PASSWORD }}" ]; then
            echo "❌ SMOKE_USER_PASSWORD missing"
            exit 1
          fi

          echo "🔐 Authenticating against Supabase..."

          AUTH_RESPONSE=$(curl -sS -X POST "${{ secrets.SUPABASE_URL }}/auth/v1/token?grant_type=password" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}" \
            -H "Content-Type: application/json" \
            --data @- <<EOF
          {
            "email": "${{ secrets.SMOKE_USER_EMAIL }}",
            "password": "${{ secrets.SMOKE_USER_PASSWORD }}"
          }
          EOF
          )

          echo "$AUTH_RESPONSE" > /tmp/smoke_auth.json

          ACCESS_TOKEN=$(python3 - <<EOF
          import json
          try:
              data = json.load(open("/tmp/smoke_auth.json"))
              print(data.get("access_token",""))
          except:
              print("")
          EOF
          )

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Supabase authentication failed"
            echo "Response:"
            cat /tmp/smoke_auth.json
            exit 1
          fi

          echo "SMOKE_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV
          echo "✅ Token acquired successfully"

      - name: API Contract Validation
        run: |
          TOKEN="${{ env.SMOKE_ACCESS_TOKEN }}"
          BASE_URL="https://api.entrega.space/api/v1"
          
          check_route() {
            ROUTE=$1
            # -L follows redirects, -s silent, -o output to blackhole, -w %{http_code} prints final status
            ST=$(curl -L -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "$BASE_URL$ROUTE" || echo "000")
            if [[ "$ST" =~ ^(200|401|403)$ ]]; then
              echo "✅ $ROUTE: Final Status $ST"
            else
              echo "❌ $ROUTE FAIL: Final Status $ST"
              exit 1
            fi
          }

          check_route "/dashboard/"
          check_route "/customers/"
          check_route "/products/"
          check_route "/movements/"
          check_route "/payments/"
          
          # Strict check for Dashboard (Must be 200 with test token)
          DASH_STATUS=$(curl -L -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "$BASE_URL/dashboard/")
          if [ "$DASH_STATUS" != "200" ]; then
            echo "❌ Dashboard Contract Internal Error: Final Status $DASH_STATUS"
            exit 1
          fi

      - name: Frontend Reachability
        run: |
          set -euo pipefail
          for PAGE in "/" "/login"; do
             ST=$(curl -L -s -o /dev/null -w "%{http_code}" "https://entrega.space$PAGE")
             if [ "$ST" = "200" ]; then
               echo "✅ FE $PAGE: $ST"
             else
               echo "❌ FE $PAGE FAIL: $ST"
               exit 1
             fi
          done

  rollback_api:
    name: 🚨 Automatic Rollback (API)
    needs: [deploy_api, final_smoke_test]
    if: failure() && needs.deploy_api.result == 'success' && needs.deploy_api.outputs.prev_revision != ''
    runs-on: ubuntu-latest
    steps:
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Restore Previous Revision
        run: |
          REV="${{ needs.deploy_api.outputs.prev_revision }}"
          echo "🚨 SMOKE TEST FAILED. Rolling back API to: $REV"
          gcloud run services update-traffic entrega-api --to-revisions=$REV=100 --region $REGION
          echo "✅ Rollback completed. Traffic routed back to $REV"
