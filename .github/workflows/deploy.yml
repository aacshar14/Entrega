name: Build and Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: entrega-468815
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/api
  WEB_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/web

jobs:
  ci:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Cache Next.js Build
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/apps/web/.next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

    - name: Web Build Validation
      working-directory: apps/web
      run: |-
        npm ci
        NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }} \
        NEXT_PUBLIC_API_URL=https://api.entrega.space \
        npm run build

  deploy:
    name: Containerize & Push
    needs: ci
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Configure Docker
      run: |-
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    # --- API Container ---
    - name: Build and Push API
      run: |-
        docker build -t $API_IMAGE:${{ github.sha }} -t $API_IMAGE:latest ./apps/api
        docker push $API_IMAGE:${{ github.sha }}
        docker push $API_IMAGE:latest

    - name: Deploy API to Cloud Run
      run: |-
        gcloud run deploy entrega-api \
          --image $API_IMAGE:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }},WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }},WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }},SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}"

    - name: API Health Check
      run: |-
        # Simple health check
        STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://api.entrega.space/ || echo "000")
        if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
           echo "🚀 API Health Check Passed: $STATUS"
        else
           echo "❌ API Unreachable or Critical Error: $STATUS"
           exit 1
        fi

    # --- Web Container ---
    - name: Build and Push Web
      run: |-
        docker build -t $WEB_IMAGE:${{ github.sha }} -t $WEB_IMAGE:latest -f apps/web/Dockerfile . \
          --build-arg NEXT_PUBLIC_API_URL=https://api.entrega.space \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        docker push $WEB_IMAGE:${{ github.sha }}
        docker push $WEB_IMAGE:latest

    - name: Deploy Web to Cloud Run
      run: |-
        gcloud run deploy entrega-web \
          --image $WEB_IMAGE:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "NEXT_PUBLIC_API_URL=https://api.entrega.space,NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"

    - name: Final Smoke Test
      run: |-
        echo "🚀 Running final smoke tests on production..."
        STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://entrega.space/ || echo "000")
        # Root redirects to /landing, so 200, 302 or 307 expected
        if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ] || [ "$STATUS" -eq 307 ]; then
           echo "✅ Production Reachable: $STATUS"
        else
           echo "❌ Production Check Failed: $STATUS"
           exit 1
        fi
