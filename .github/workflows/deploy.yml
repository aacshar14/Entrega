name: Build and Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: entrega-468815
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/api
  WEB_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Configure Docker
      run: |-
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    # --- Backend Deploy ---
    - name: Build and Tag API Container
      run: |-
        docker build -t $API_IMAGE:${{ github.sha }} -t $API_IMAGE:latest ./apps/api

    - name: API Smoke Test
      run: |-
        docker run --rm $API_IMAGE:${{ github.sha }} python -c "from app.main import app; print('🚀 Smoke test: app.main imported correctly')"

    - name: Push API Container
      run: |-
        docker push $API_IMAGE:${{ github.sha }}
        docker push $API_IMAGE:latest

    - name: Deploy API to Cloud Run
      run: |-
        gcloud run deploy entrega-api \
          --image $API_IMAGE:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }},WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }},WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }},SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}"

    # --- Frontend Deploy ---
    - name: Build Web Container
      run: |-
        docker build -t $WEB_IMAGE:${{ github.sha }} -t $WEB_IMAGE:latest -f apps/web/Dockerfile . --build-arg NEXT_PUBLIC_API_URL=https://api.entrega.space

    - name: Push Web Container
      run: |-
        docker push $WEB_IMAGE:${{ github.sha }}
        docker push $WEB_IMAGE:latest

    - name: Deploy Web to Cloud Run
      run: |-
        gcloud run deploy entrega-web \
          --image $WEB_IMAGE:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "NEXT_PUBLIC_API_URL=https://api.entrega.space"
