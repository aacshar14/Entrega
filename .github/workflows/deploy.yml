name: Build and Deploy to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: entrega-468815
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/api
  WEB_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/web

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Google Auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up Cloud SDK
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: Configure Docker
      run: |-
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    # --- Pre-build Validation ---
    - name: Web Static Build Validation
      working-directory: apps/web
      run: |-
        npm install
        NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }} NEXT_PUBLIC_API_URL=https://api.entrega.space npm run build

    # --- Backend Deploy ---
    - name: Build and Tag API Container
      run: |-
        docker build -t $API_IMAGE:${{ github.sha }} -t $API_IMAGE:latest ./apps/api

    - name: API Smoke Test
      run: |-
        docker run --rm \
          -e DATABASE_URL="postgresql://test:test@localhost:5432/db" \
          -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
          -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          -e SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
          -e SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }} \
          $API_IMAGE:${{ github.sha }} python -c "from app.main import app; print('🚀 Smoke test: app.main imported correctly')"


    - name: Push API Container
      run: |-
        docker push $API_IMAGE:${{ github.sha }}
        docker push $API_IMAGE:latest

    - name: Deploy API to Cloud Run
      run: |-
        gcloud run deploy entrega-api \
          --image $API_IMAGE:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }},WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }},WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }},SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}"

    - name: API Health Check
      run: |-
        curl -f https://api.entrega.space/ || (echo "❌ API Unreachable" && exit 1)

    # --- Frontend Deploy ---
    - name: Build Web Container
      run: |-
        docker build -t $WEB_IMAGE:${{ github.sha }} -t $WEB_IMAGE:latest -f apps/web/Dockerfile . \
          --build-arg NEXT_PUBLIC_API_URL=https://api.entrega.space \
          --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}

    - name: Web Container Smoke Test
      run: |-
        docker run --rm $WEB_IMAGE:${{ github.sha }} sh -c "test -d .next" && echo "🚀 Web build trace found"

    - name: Push Web Container
      run: |-
        docker push $WEB_IMAGE:${{ github.sha }}
        docker push $WEB_IMAGE:latest

    - name: Deploy Web to Cloud Run
      run: |-
        gcloud run deploy entrega-web \
          --image $WEB_IMAGE:${{ github.sha }} \
          --region $REGION \
          --platform managed \
          --allow-unauthenticated \
          --set-env-vars "NEXT_PUBLIC_API_URL=https://api.entrega.space,NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }}"

    - name: Web Health Check
      run: |-
        curl -f https://entrega.space/ || (echo "❌ Web Unreachable" && exit 1)
