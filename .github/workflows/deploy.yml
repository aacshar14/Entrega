name: Build and Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["Code Quality Check"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_ID: entrega-468815
  REGION: us-central1
  API_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/api
  WEB_IMAGE: us-central1-docker.pkg.dev/entrega-468815/entrega-repo/web

jobs:
  changes:
    name: Detect Changes
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - '.github/workflows/deploy.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/deploy.yml'

  build_api:
    name: Build & Push API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: |-
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: 🧪 Code Quality Validation
        run: |
          pip install black==26.3.1
          echo "Running Black format check..."
          black --check . --exclude "apps/api/alembic/versions/"
          echo "Running Python syntax validation..."
          python -m py_compile $(git ls-files '*.py')

      - name: Build and Push Docker Image
        run: |-
          docker build -t $API_IMAGE:${{ github.sha }} -t $API_IMAGE:latest ./apps/api
          docker push $API_IMAGE:${{ github.sha }}
          docker push $API_IMAGE:latest

      - name: 🛡️ Trivy Security Scan (API)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  migrate_db:
    name: 🚀 Migrate Database
    needs: build_api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Run Alembic Migration Job
        run: |-
          gcloud run jobs deploy entrega-migrate \
            --image $API_IMAGE:${{ github.sha }} \
            --region $REGION \
            --command=python \
            --args=-m,alembic,upgrade,head \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --quiet

          echo "Executing migration job..."
          gcloud run jobs execute entrega-migrate --region $REGION --wait

  deploy_api:
    name: Deploy API
    needs: migrate_db
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy entrega-api \
            --image $API_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }},WHATSAPP_VERIFY_TOKEN=${{ secrets.WHATSAPP_VERIFY_TOKEN }},WHATSAPP_ACCESS_TOKEN=${{ secrets.WHATSAPP_ACCESS_TOKEN }},WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }},SECRET_KEY=${{ secrets.SECRET_KEY }},ENVIRONMENT=production,SUPABASE_URL=${{ secrets.SUPABASE_URL }},SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }},WHATSAPP_APP_ID=${{ secrets.WHATSAPP_APP_ID }},WHATSAPP_APP_SECRET=${{ secrets.WHATSAPP_APP_SECRET }}"

      - name: API Health Check
        run: |-
          echo "Waiting 15s for Cloud Run revision stabilization..."
          sleep 15
          max_attempts=10
          attempt=1
          until [ $attempt -gt $max_attempts ]; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://api.entrega.space/api/v1/health/)
            if [ "$STATUS" -eq 200 ]; then
              echo "🚀 API Health Check Passed: $STATUS"
              exit 0
            fi
            echo "Attempt $attempt failed with status $STATUS. Retrying in 6s..."
            sleep 6
            attempt=$((attempt + 1))
          done
          echo "❌ API Unreachable after $max_attempts attempts."
          exit 1

  ci_web:
    name: Web Build Validation
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Web Build
        working-directory: apps/web
        run: |-
          npm ci
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }} \
          NEXT_PUBLIC_API_URL=https://api.entrega.space \
          npm run build

  deploy_web:
    name: Deploy Web
    needs: [changes, ci_web, deploy_api]
    if: always() && needs.changes.outputs.web == 'true' && (needs.ci_web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker
        run: |-
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & Push Web Image
        run: |-
          docker build -t $WEB_IMAGE:${{ github.sha }} -t $WEB_IMAGE:latest -f apps/web/Dockerfile . \
            --build-arg NEXT_PUBLIC_API_URL=https://api.entrega.space \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }} \
            --build-arg NEXT_PUBLIC_META_APP_ID=${{ secrets.WHATSAPP_APP_ID }}
          
          docker push $WEB_IMAGE:${{ github.sha }}
          docker push $WEB_IMAGE:latest

      - name: Deploy Web to Cloud Run
        run: |-
          gcloud run deploy entrega-web \
            --image $WEB_IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_API_URL=https://api.entrega.space,NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }},NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_PUBLISHABLE_DEFAULT_KEY }},NEXT_PUBLIC_META_APP_ID=${{ secrets.WHATSAPP_APP_ID }}"

  finalize:
    name: Final Smoke Test
    needs: [deploy_api, deploy_web]
    if: always() && (needs.deploy_api.result == 'success' || needs.deploy_web.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Production Smoke Test
        run: |-
          echo "🚀 Running final smoke tests on production..."
          
          # 1. Frontend Check
          FE_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://entrega.space/ || echo "000")
          if [ "$FE_STATUS" -eq 200 ] || [ "$FE_STATUS" -eq 301 ] || [ "$FE_STATUS" -eq 302 ] || [ "$FE_STATUS" -eq 307 ]; then
             echo "✅ Frontend Reachable: $FE_STATUS"
          else
             echo "❌ Frontend Check Failed: $FE_STATUS"
             exit 1
          fi

          # 2. API Health Check
          API_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://api.entrega.space/api/v1/health/ || echo "000")
          if [ "$API_STATUS" -eq 200 ]; then
             echo "✅ API Healthy: $API_STATUS"
          else
             echo "❌ API Health Check Failed: $API_STATUS"
             exit 1
          fi
