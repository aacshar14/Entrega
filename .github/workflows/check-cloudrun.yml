name: Check Cloud Run
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: entrega-468815
      - run: |
          gcloud logging read "resource.type=cloud_run_revision AND resource.labels.service_name=entrega-api AND resource.labels.revision_name=entrega-api-00442-8zs AND severity>=WARNING" --limit=50 --format="table(timestamp, severity, textPayload)"
