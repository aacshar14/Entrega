version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: entrega_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: entrega_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./apps/api
    container_name: entrega_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/entrega_db
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
    container_name: entrega_web
    restart: always
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules # prevent overwriting modules with local mount

volumes:
  postgres_data:
